<h1>Welcome to Silver Creek</h1>

{% assign welcome_pdf = site.static_files | where_exp: "file", "file.path contains 'Welcome Pack'" | first %}

        src="{{ welcome_pdf.path | relative_url }}" 
        style="width:100%; height:900px; border:none; display:block;">

{% else %}

    <p>Welcome Packet PDF not found.</p>

{% endif %}
