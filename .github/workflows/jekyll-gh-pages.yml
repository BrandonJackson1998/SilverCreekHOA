name: Deploy Jekyll with Google Drive Sync

on:
  push:
    branches: ["main"]

  workflow_dispatch:

  schedule:
    - cron: "0 0 * * 0"  # weekly

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:

  # -----------------------------
  # 1) SYNC JOB
  # -----------------------------
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - name: Install rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONF_B64 }}" | base64 -d > ~/.config/rclone/rclone.conf
          chmod 600 ~/.config/rclone/rclone.conf

      - name: Debug rclone config
        run: |
          cat ~/.config/rclone/rclone.conf

      - name: Sync Google Drive HOA Docs
        run: |
          mkdir -p HOA-Documents

          rclone sync "gdrive:1bWUFyVYUiZVGKmDa9KeFmRlk8lrCEgHF" HOA-Documents \
            --quiet \
            --stats 0 \
            --timeout 10m

      - name: Upload synced files
        uses: actions/upload-artifact@v4
        with:
          name: hoa-docs
          path: HOA-Documents


  # -----------------------------
  # 2) BUILD JOB
  # -----------------------------
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: sync

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Google Drive files
        uses: actions/download-artifact@v4
        with:
          name: hoa-docs
          path: HOA-Documents

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build Jekyll site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3


  # -----------------------------
  # 3) DEPLOY JOB
  # -----------------------------
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5